profile = "go"
shell = "bash"

[recipes.install]
help = "Build and install git-agent and optional fish completion"
sandboxed = false
cmd = '''
set -euo pipefail

fish_config_dir="${XDG_CONFIG_HOME:-$HOME/.config}/fish"

go install -ldflags='{ldflags}' ./cmd/git-agent

if [[ -d "${fish_config_dir}" ]]; then
	completions_dir="${fish_config_dir}/completions"
	install -d "$completions_dir"
	install -m 0644 completions/git-agent.fish "$completions_dir/git-agent.fish"
fi
'''

[recipes.install.arguments.fish_config_dir]
help = "Fish config directory; empty uses $XDG_CONFIG_HOME/fish"
type = "path"
default = ""
