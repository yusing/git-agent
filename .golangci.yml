version: "2"

linters:
  exclusions:
    rules:
      - linters: [errcheck]
        source: '^\s*defer\s+.*\.Close\(\)'
      - linters: [errcheck]
        path: '_test\.go$'
        source: '^\s*defer\s+'
      - linters: [errcheck]
        path: '_test\.go$'
        source: '^\s*fmt\.Fprint(?:f|ln)?\('
